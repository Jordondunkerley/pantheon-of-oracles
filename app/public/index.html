<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pantheon of Oracles: The Council Chamber</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell game-shell">
      <header class="hero">
        <p class="eyebrow">Pantheon of Oracles</p>
        <h1>The Council Chamber</h1>
        <p id="product-framing" class="lede"></p>
      </header>

      <section class="scene-nav panel">
        <div class="panel-header">
          <h2>Chamber Progression</h2>
          <div id="scene-pills" class="button-row"></div>
        </div>
        <div id="milestones" class="roster-grid top-gap"></div>
      </section>

      <section id="scene-title-screen" class="scene panel active-scene compact-scene">
        <h2>Title Screen</h2>
        <p class="section-note">The threshold before the ritual begins.</p>
        <div id="title-screen-content" class="roster-grid"></div>
      </section>

      <section id="scene-first-entrance" class="scene panel hidden-scene compact-scene">
        <h2>First Entrance Ritual</h2>
        <p id="ritual-invocation" class="section-note"></p>
        <ol id="ritual-steps" class="flow-list"></ol>
      </section>

      <section id="scene-chart-awakening" class="scene panel hidden-scene compact-scene">
        <h2>Chart Awakening</h2>
        <div id="chart-generation" class="flow-stage-list"></div>
      </section>

      <section id="scene-council-formation" class="scene panel hidden-scene compact-scene">
        <h2>Council Formation</h2>
        <div class="grid two-up">
          <div id="anointed-ruler" class="roster-grid"></div>
          <div id="crowned-candidates" class="roster-grid"></div>
        </div>
      </section>

      <section id="scene-chamber-hub" class="scene panel hidden-scene compact-scene">
        <h2>Chamber Hub</h2>
        <p id="chamber-return-state" class="section-note"></p>
        <div class="grid two-up">
          <div>
            <div class="stack-form">
              <select id="oracle-view-filter">
                <option value="all">All oracles</option>
                <option value="council">Council only</option>
                <option value="solar">Solar-aligned</option>
                <option value="lunar">Lunar-aligned</option>
              </select>
              <input id="oracle-search" placeholder="Search oracle name, planet, title, sign..." />
            </div>
            <div id="oracle-roster" class="roster-grid"></div>
          </div>
          <div>
            <div id="current-user" class="roster-grid"></div>
          </div>
        </div>
      </section>

      <section id="scene-oracle-room" class="scene panel hidden-scene compact-scene">
        <h2>Oracle Room</h2>
        <p id="oracle-room-prompt" class="section-note"></p>
        <div class="grid two-up">
          <div>
            <div id="oracle-detail" class="roster-grid"></div>
            <div class="stack-form top-gap">
              <select id="oracle-comms-select"></select>
              <textarea id="oracle-comms-message" placeholder="Draft a message, invocation, or check-in prompt for an oracle..."></textarea>
              <div class="button-row">
                <button id="oracle-draft-btn" type="button">Create draft</button>
                <button id="oracle-log-btn" type="button">Log note</button>
              </div>
            </div>
          </div>
          <div>
            <div id="session-list" class="session-list"></div>
            <div id="oracle-room-meta" class="top-gap"></div>
            <div id="session-detail" class="roster-grid top-gap"></div>
            <form id="message-form" class="stack-form top-gap">
              <textarea name="text" placeholder="Send a message into the chamber"></textarea>
              <button type="submit">Send message</button>
            </form>
          </div>
        </div>
        <div id="oracle-drafts" class="roster-grid top-gap"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
